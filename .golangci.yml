version: "2"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/hebertzin/cqrs

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gosec
    - misspell

linters-settings:
  gosec:
    excludes:
      - G104
      - G117
      - G401
      - G501
      - G704

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
        - gosec

    - path: "tests/"
      linters:
        - errcheck
        - gosec
